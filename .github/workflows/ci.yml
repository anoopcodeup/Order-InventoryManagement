name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Backend Checks & Live DB Integration Testing
  backend-tests:
    runs-on: ubuntu-latest

    # Setup a live PostgreSQL container inside GitHub Actions
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start FastAPI server in background
        working-directory: ./backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        env:
          # Tell FastAPI to connect to our Actions PostgreSQL service
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_db

      - name: Run backend integration tests
        run: |
          python test_api.py
        env:
          # Tell our test runner to access our running FastAPI background service
          BASE_URL: http://localhost:8000

  # -----------------------------------------------------------------
  # JOB 2: Frontend Compilation & Quality Checks
  # -----------------------------------------------------------------
  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Test production compilation
        working-directory: ./frontend
        run: npm run build
        env:
          # Compile using a mock URL to verify bundler integrity
          VITE_API_URL: https://mock-api-url.com
